<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de QR Code Personnalisé</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('./images/qr.webp');
            background-size: cover;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            padding: 22px 20px;
            border-radius: 18px;
            text-align: center;
            width: 300px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 1.3rem;
            margin: 0 0 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .input-wrapper svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: #6b909a;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 10px 10px 32px;
            border-radius: 8px;
            border: solid 1px rgb(107, 144, 154);
            font-size: 0.85rem;
            background-color: #fff;
            color: #333;
            text-align: left;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        .icon-buttons {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            margin-top: 4px;
        }

        .icon-buttons button {
            background: #007bff;
            border: none;
            color: white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.15s;
        }

        .icon-buttons button svg {
            width: 17px;
            height: 17px;
            fill: white;
        }

        .icon-buttons button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .icon-buttons button:active {
            transform: translateY(0);
        }

        .icon-buttons button[title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: -26px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 0.65rem;
            padding: 3px 7px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
        }

        .icon-buttons button {
            position: relative;
        }

        .download-button.active {
            animation: pulse 1.5s infinite, move 1s ease-out forwards; /* Ajout de l'animation de mouvement */
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes move {
            0% {
                transform: translateY(0); /* Position initiale */
            }
            50% {
                transform: translateY(-10px); /* Déplacement vers le haut */
            }
            100% {
                transform: translateY(0); /* Retour à la position d'origine */
            }
        }

        .settings-panel {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            justify-content: center;
            gap: 18px;
        }

        .settings-panel.open {
            display: flex;
        }

        .color-field {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
        }

        .color-field input[type="color"] {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        #qrcode {
            margin-top: 16px;
            min-height: 10px;
            position: relative;
        }

        #qrcode canvas {
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Personnalisé</h1>
        <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M3.9 12a4.1 4.1 0 0 1 4.1-4.1h4V6H8a6 6 0 0 0 0 12h4v-1.9H8A4.1 4.1 0 0 1 3.9 12zM16 6h-4v1.9h4a4.1 4.1 0 0 1 0 8.2h-4V18h4a6 6 0 0 0 0-12zM8 13h8v-2H8v2z"/></svg>
            <input type="text" id="textInput" placeholder="Texte ou URL">
        </div>
        <div class="icon-buttons">
            <button title="Générer" onclick="generateQRCode()">
                <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zM13 3v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zM13 13v2h2v-2h-2zM19 13h2v2h-2v-2zM13 19h2v2h-2v-2zM15 17h2v-2h-2v2zM17 19h2v2h-2v-2zM19 17h2v2h-2v-2z"/></svg>
            </button>
            <button title="Réinitialiser" onclick="resetForm()">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A8 8 0 1 0 19.9 13h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            </button>
            <button class="download-button" title="Télécharger" onclick="downloadQRCode()">
                <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18v12.17l3.59-3.58L17 12l-5 5-5-5 1.41-1.41L11 14.17V2h1z"/></svg>
            </button>
            <button title="Réglages" onclick="toggleSettings()">
                <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98l-.38-2.65A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.38 2.65c-.61.25-1.17.58-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.24.39.32.6.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65A.49.49 0 0 0 10 22h4a.49.49 0 0 0 .49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1c.24.1.49 0 .6-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>
            </button>
        </div>
        <div id="qrcode"></div>
        <div class="settings-panel" id="settingsPanel">
            <label class="color-field">
                QR
                <input type="color" id="foregroundColor" value="#000000">
            </label>
            <label class="color-field">
                Fond
                <input type="color" id="backgroundColor" value="#ffffff">
            </label>
        </div>
    </div>

    <script>
        let generatedCanvas = null;
        
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        async function generateQRCode() {
            const text = document.getElementById('textInput').value.trim();
            const foregroundColor = document.getElementById('foregroundColor').value;
            const backgroundColor = document.getElementById('backgroundColor').value;
            const qrCodeContainer = document.getElementById('qrcode');

            qrCodeContainer.innerHTML = '';
            generatedCanvas = null;

            if (!text) {
                alert('Veuillez entrer un texte ou une URL.');
                return;
            }

            const canvas = document.createElement('canvas');
            const size = 125;
            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');

            await QRCode.toCanvas(canvas, text, {
                width: size,
                margin: 2,
                color: { dark: foregroundColor, light: backgroundColor }
            });

            qrCodeContainer.appendChild(canvas);
            generatedCanvas = canvas;
            document.querySelector('.download-button').classList.add('active');
        }

        function resetForm() {
            document.getElementById('textInput').value = '';
            document.getElementById('foregroundColor').value = '#000000';
            document.getElementById('backgroundColor').value = '#ffffff';
            const qrCodeContainer = document.getElementById('qrcode');
            qrCodeContainer.innerHTML = '';
            generatedCanvas = null;
            document.querySelector('.download-button').classList.remove('active');
        }

        function downloadQRCode() {
            if (!generatedCanvas) {
                alert('Aucun QR code à télécharger. Veuillez en générer un d\'abord.');
                return;
            }
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = generatedCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
